<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | Sainthood</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="main-header"></header>
    <div class="content-wrapper">
        <div class="grid-layout">
            <div>
                <h2 style="color: var(--royal-blue);">Connect With Us</h2>
                <p style="margin: 20px 0;">We would love to welcome you to our campus for a tour.</p>
                <div class="card" style="margin-top: 20px;">
                    <p>📞 +91 911 222 3333</p>
                    <p>✉️ admission@sainthood.school</p>
                </div>
            </div>
            <div class="card" style="background: white; border: 2px solid var(--sky-blue);">
                <form>
                    <input type="text" placeholder="Parent Name" required>
                    <input type="email" placeholder="Email Address" required>
                    <textarea placeholder="Your Message" style="height: 120px;"></textarea>
                    <button type="submit">Submit Request</button>
                </form>
            </div>
        </div>
    </div>
    <footer id="main-footer"></footer>
    <script src="script.js"></script>
</body>
</html>
